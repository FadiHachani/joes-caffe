<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joe's Caffè — Menu QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#f3f8f7; --espresso:#0c1413; --coffee:#157d79; --accent:#1fa9a3; }
    * { box-sizing: border-box; }
    body {
      font-family:"Poppins",sans-serif; background:var(--cream); color:var(--espresso);
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
    }
    .card {
      background:#fff; border-radius:24px; padding:2.5rem; max-width:420px; width:100%;
      box-shadow:0 20px 50px rgba(46,33,26,.12); text-align:center;
    }
    h1 { font-family:"Playfair Display",serif; color:var(--coffee); margin:0 0 .25rem; font-size:1.8rem; }
    .sub { color:#9c7a5b; font-weight:300; margin:0 0 1.5rem; font-size:.9rem; }
    #qr {
      display:inline-block; padding:1rem; background:#fff; border-radius:16px;
      border:1px solid rgba(111,78,55,.12); min-height:236px;
    }
    .scan-label { margin:1.25rem 0 1.5rem; font-weight:500; letter-spacing:.04em; }
    label { display:block; text-align:left; font-size:.8rem; font-weight:500; margin:0 0 .35rem; color:var(--coffee); }
    input {
      width:100%; padding:.7rem .9rem; border:1px solid rgba(111,78,55,.25); border-radius:10px;
      font-family:inherit; font-size:.9rem; margin-bottom:1rem;
    }
    .btns { display:flex; gap:.6rem; }
    button {
      flex:1; padding:.75rem; border:none; border-radius:10px; font-family:inherit;
      font-weight:500; font-size:.88rem; cursor:pointer; transition:opacity .2s;
    }
    button:hover { opacity:.88; }
    .btn-primary { background:var(--coffee); color:var(--cream); }
    .btn-ghost { background:var(--cream); color:var(--coffee); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Joe's Caffè</h1>
    <p class="sub">Scan to view our menu</p>
    <div id="qr"></div>
    <p class="scan-label">📱 Point your camera here</p>

    <label for="url">Menu URL</label>
    <input id="url" type="url" value="https://example.com/menu" />
    <div class="btns">
      <button class="btn-primary" id="download">Download PNG</button>
      <button class="btn-ghost" id="update">Update</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const qrEl = document.getElementById("qr");
    const urlInput = document.getElementById("url");
    let canvas;

    function render() {
      qrEl.innerHTML = "";
      canvas = document.createElement("canvas");
      qrEl.appendChild(canvas);
      QRCode.toCanvas(canvas, urlInput.value || " ", {
        width: 220,
        margin: 1,
        color: { dark: "#0c1413", light: "#ffffff" },
        errorCorrectionLevel: "M",
      }, (err) => { if (err) console.error(err); });
    }

    document.getElementById("update").addEventListener("click", render);
    urlInput.addEventListener("change", render);
    document.getElementById("download").addEventListener("click", () => {
      if (!canvas) return;
      const a = document.createElement("a");
      a.download = "joes-caffe-menu-qr.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    });

    render();
  </script>
</body>
</html>
